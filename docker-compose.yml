services:
  postgres:
    image: postgres:16-alpine
    container_name: crypto-pair-postgres
    environment:
      POSTGRES_DB: crypto_pairs
      POSTGRES_USER: crypto
      POSTGRES_PASSWORD: crypto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crypto -d crypto_pairs"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

